<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:#FAF6F0;color:#3A2E22}
input[type=range]{accent-color:#8B7355}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#D4C5B0;border-radius:3px}
@media print{
  .no-print{display:none!important}
  .print-only{display:block!important}
  body{background:#fff!important;overflow:visible!important}
  html,body,#root{height:auto!important;overflow:visible!important}
  @page{margin:12mm 10mm;size:A4}
}
.print-only{display:none}
.print-page-break{page-break-before:always}
.day-shell{flex:1;overflow-y:auto;padding:22px;background:#FAF6F0}
.day-inner{max-width:1180px;margin:0 auto}
.day-hero{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.day-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;color:#5A4A3A}
.day-actions{display:flex;gap:8px;flex-wrap:wrap}
.day-stats{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.day-grid{display:grid;grid-template-columns:minmax(280px,1.05fr) minmax(300px,1fr);gap:14px;align-items:start}
.day-stack{display:grid;gap:14px}
.day-section{background:#FFFCF7;border:1px solid #E8DDD0;border-radius:8px;padding:16px}
.day-table-list{display:grid;gap:8px;max-height:520px;overflow-y:auto;padding-right:4px}
.app-shell{width:100%;height:100vh;display:flex;flex-direction:column;background:#FAF6F0;font-family:'Outfit',sans-serif;color:#3A2E22;overflow:hidden}
.app-header{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #E8DDD0;background:#FFFCF7;flex-shrink:0;flex-wrap:wrap;gap:8px}
.app-tabs{display:flex;gap:3px;background:#F0E8DC;border-radius:8px;padding:3px}
.app-actions{display:flex;gap:14px;font-size:11px;color:#8A7A6A;align-items:center}
@media (max-width: 820px){
  html,body,#root{overflow:auto}
  .app-shell{height:auto;min-height:100vh;overflow:visible}
  .app-header{padding:10px 12px;align-items:flex-start}
  .app-tabs{order:3;width:100%;overflow-x:auto}
  .app-tabs button{white-space:nowrap;flex:0 0 auto}
  .app-actions{width:100%;gap:6px;overflow-x:auto;padding-bottom:2px}
  .app-actions span{white-space:nowrap}
  .app-actions button{white-space:nowrap}
  .day-shell{padding:14px;height:auto;min-height:100vh}
  .day-title{font-size:25px}
  .day-actions{width:100%}
  .day-actions button{flex:1;min-width:140px}
  .day-stats{grid-template-columns:repeat(2,minmax(0,1fr))}
  .day-grid{grid-template-columns:1fr}
  .day-table-list{max-height:none;overflow:visible;padding-right:0}
}
@media (max-width: 480px){
  .app-header h1{font-size:20px!important}
  .app-actions{font-size:10px}
  .app-actions button{padding:4px 8px!important}
  .day-shell{padding:10px}
  .day-hero{gap:10px}
  .day-title{font-size:22px}
  .day-stats{grid-template-columns:1fr}
  .day-section{padding:12px}
  .day-actions button{width:100%;min-width:0}
}
</style>

<div id="pw-gate" style="position:fixed;inset:0;z-index:9999;background:#FAF6F0;display:flex;align-items:center;justify-content:center;flex-direction:column">
  <h1 style="font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:#5A4A3A;margin-bottom:8px">Château des Grotteaux</h1>
  <div style="font-size:13px;color:#A09080;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px">Espace privé — Mariage</div>
  <input id="pw-input" type="password" placeholder="Mot de passe" style="padding:12px 18px;border-radius:10px;border:1.5px solid #D4C5B0;background:#FFFCF7;font-family:'Outfit',sans-serif;font-size:15px;width:280px;text-align:center;outline:none;margin-bottom:12px"/>
  <button onclick="checkPw()" style="padding:10px 28px;border-radius:10px;border:none;background:#8B7355;color:#FFFCF7;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer">Accéder</button>
  <div id="pw-err" style="color:#C07050;font-size:12px;margin-top:10px"></div>
</div>
<script>
// Password: change WEDDING_PASSWORD to your own password
const WEDDING_PASSWORD = "grotteaux2026";
const PW_STORAGE = "grotteaux_pw_ok";
function checkPw(){
  const v=document.getElementById("pw-input").value;
  if(v===WEDDING_PASSWORD){sessionStorage.setItem(PW_STORAGE,"1");document.getElementById("pw-gate").style.display="none";}
  else{document.getElementById("pw-err").textContent="Mot de passe incorrect";}
}
document.getElementById("pw-input").addEventListener("keydown",e=>{if(e.key==="Enter")checkPw();});
if(sessionStorage.getItem(PW_STORAGE)==="1"){document.getElementById("pw-gate").style.display="none";}
</script>

function getChairs(t) {
  if(t.seatLayout?.mode==="manual" && Array.isArray(t.seatLayout?.manual)){
    const rot=(t.rotation||0)*Math.PI/180,ca=Math.cos(rot),sa=Math.sin(rot);
    return t.seatLayout.manual.map(p=>({
      x:t.x + p.x*ca - p.y*sa,
      y:t.y + p.x*sa + p.y*ca,
    }));
  }
  const ch = [];
  if (t.shape==="round") {
    const r = t.radius+28;
    for(let i=0;i<t.seats;i++){const a=(2*Math.PI*i)/t.seats-Math.PI/2;ch.push({x:t.x+Math.cos(a)*r,y:t.y+Math.sin(a)*r});}
  } else if(t.shape==="rect") {
    const w=t.width/2+28,h=t.height/2+28;
    const addSide=(side,count)=>{
      if(count<=0)return;
      for(let i=0;i<count;i++){
        const f=(i+.5)/count;let cx,cy;
        if(side===0){cx=t.x-w+f*2*w;cy=t.y-h;}
        else if(side===1){cx=t.x+w;cy=t.y-h+f*2*h;}
        else if(side===2){cx=t.x+w-f*2*w;cy=t.y+h;}
        else {cx=t.x-w;cy=t.y+h-f*2*h;}
        ch.push({x:cx,y:cy});
      }
    };
    const mode=t.seatLayout?.mode||"perimeter";
    if(mode==="custom"){
      const sides=t.seatLayout?.sides||{};
      addSide(0,Math.max(0,+sides.top||0));
      addSide(1,Math.max(0,+sides.right||0));
      addSide(2,Math.max(0,+sides.bottom||0));
      addSide(3,Math.max(0,+sides.left||0));
    } else if(mode==="longSides"){
      const a=Math.ceil(t.seats/2),b=Math.max(0,t.seats-a);
      if((t.width||0)>=(t.height||0)){ addSide(0,a); addSide(2,b); }
      else { addSide(1,a); addSide(3,b); }
    } else {
      const lens=[2*w,2*h,2*w,2*h],sum=lens.reduce((s,v)=>s+v,0);
      const raw=lens.map(v=>t.seats*v/sum),cnt=raw.map(v=>Math.floor(v));
      let rem=t.seats-cnt.reduce((s,v)=>s+v,0);
      const order=raw.map((v,i)=>({i,f:v-cnt[i]})).sort((a,b)=>b.f-a.f);
      for(let i=0;i<rem;i++)cnt[order[i%order.length].i]++;
      addSide(0,cnt[0]);addSide(1,cnt[1]);addSide(2,cnt[2]);addSide(3,cnt[3]);
    }
  }
  if(t.shape==="u"){
    const ch=[];
    const w=getUEffectiveUWidth(t), h=Math.max(120,t.uHeight||220), tk=Math.min(Math.max(28,t.thickness||58),Math.min(w,h)-24);
    const topShare=Math.min(0.92,Math.max(0.45, (t.uTopShare??0.72)));
    const seats=Math.max(0,t.seats||0);
    const topSeats=Math.max(0,Math.min(seats,Math.round(seats*topShare)));
    const x0=t.x-w/2, y0=t.y-h/2, x1=t.x+w/2, y1=t.y+h/2;
    const topLenOuter=Math.max(20,w-tk), topLenInner=Math.max(20,w-tk), sideLen=Math.max(20,h-tk);
    const alloc=(total,lengths)=>{
      const sum=lengths.reduce((s,v)=>s+v,0)||1;
      const raw=lengths.map(v=>total*v/sum), cnt=raw.map(v=>Math.floor(v));
      let rem=total-cnt.reduce((s,v)=>s+v,0);
      const order=raw.map((v,i)=>({i,f:v-cnt[i]})).sort((a,b)=>b.f-a.f);
      for(let i=0;i<rem;i++)cnt[order[i%order.length].i]++;
      return cnt;
    };
    const sideSeats=Math.max(0,seats-topSeats);
    const [extTop,intTop]=alloc(topSeats,[topLenOuter,topLenInner]);
    const [extLeft,extRight,intLeft,intRight]=alloc(sideSeats,[sideLen,sideLen,sideLen,sideLen]);
    const placeLinear=(count,start,end,fixed,axis,pad=0)=>{
      if(count<=0)return;
      const span=Math.max(0,end-start);
      if(count===1){
        const p=start+span/2;
        ch.push(axis==="x"?{x:p,y:fixed}:{x:fixed,y:p});
        return;
      }
      const innerStart=start+pad, innerEnd=end-pad;
      const innerSpan=Math.max(0,innerEnd-innerStart);
      for(let i=0;i<count;i++){
        const f=(i+.5)/count;
        const p=innerStart+f*innerSpan;
        ch.push(axis==="x"?{x:p,y:fixed}:{x:fixed,y:p});
      }
    };
    const cornerPad=CHAIR_R+8;
    placeLinear(extTop,x0+tk/2,x1-tk/2,y0-28,"x",cornerPad);
    placeLinear(extLeft,y0+tk/2,y1-tk/2,x0-28,"y",cornerPad);
    placeLinear(extRight,y0+tk/2,y1-tk/2,x1+28,"y",cornerPad);
    placeLinear(intTop,x0+tk/2,x1-tk/2,y0+tk+28,"x",cornerPad);
    placeLinear(intLeft,y0+tk/2,y1-tk/2,x0+tk+28,"y",cornerPad);
    placeLinear(intRight,y0+tk/2,y1-tk/2,x1-tk-28,"y",cornerPad);
    if((t.rotation||0)!==0){
      const a=(t.rotation||0)*Math.PI/180,ca=Math.cos(a),sa=Math.sin(a);
      return ch.map(p=>{const dx=p.x-t.x,dy=p.y-t.y;return{x:t.x+dx*ca-dy*sa,y:t.y+dx*sa+dy*ca};});
    }
    return ch;
  }
  if(t.shape==="corner"){
    const ch=[];
    const w=Math.max(80,t.cornerW||180), h=Math.max(80,t.cornerH||180), tk=Math.min(Math.max(36,t.thickness||60),Math.min(w,h)-20);
    const x0=t.x-w/2, y0=t.y-h/2;
    const topLen=Math.max(20,w-tk), leftLen=Math.max(20,h-tk), seats=Math.max(0,t.seats||0);
    const topCount=Math.round(seats*(topLen/(topLen+leftLen))), leftCount=Math.max(0,seats-topCount);
    for(let i=0;i<topCount;i++){const f=(i+.5)/topCount;ch.push({x:x0+tk/2+f*topLen,y:y0-28});}
    for(let i=0;i<leftCount;i++){const f=(i+.5)/leftCount;ch.push({x:x0-28,y:y0+tk/2+f*leftLen});}
    if((t.rotation||0)!==0){
      const a=(t.rotation||0)*Math.PI/180,ca=Math.cos(a),sa=Math.sin(a);
      return ch.map(p=>{const dx=p.x-t.x,dy=p.y-t.y;return{x:t.x+dx*ca-dy*sa,y:t.y+dx*sa+dy*ca};});
    }
    return ch;
  }
  if((t.shape==="rect"||t.shape==="corner") && (t.rotation||0)!==0){
    const a=(t.rotation||0)*Math.PI/180,ca=Math.cos(a),sa=Math.sin(a);
    return ch.map(p=>{
      const dx=p.x-t.x, dy=p.y-t.y;
      return {x:t.x+dx*ca-dy*sa,y:t.y+dx*sa+dy*ca};
    });
  }
  return ch;
}

function getUEffectiveUWidth(t){
  if(t.shape!=="u") return Math.max(120,t.uWidth||260);
  return Math.max(120,t.uWidth||260);
}

function getURecommendedWidth(t){
  if(t.shape!=="u") return Math.max(120,t.uWidth||260);
  const w=Math.max(120,t.uWidth||260), h=Math.max(120,t.uHeight||220), tk=Math.min(Math.max(28,t.thickness||58),Math.min(w,h)-24);
  const topShare=Math.min(0.92,Math.max(0.45,(t.uTopShare??0.72)));
  const seats=Math.max(0,t.seats||0);
  const topSeats=Math.max(0,Math.min(seats,Math.round(seats*topShare)));
  const pad=2*(CHAIR_R+8);
  const needPerTopLine=Math.max(20,Math.ceil((topSeats*MIN_CHAIR_PITCH)/2));
  const needW=Math.max(120,Math.ceil(tk + needPerTopLine + pad));
  return Math.max(w,needW);
}

function getRectSeatCounts(t){
  const seats=Math.max(1,t.seats||0);
  if(t.seatLayout?.mode==="custom"){
    const s=t.seatLayout?.sides||{};
    return {top:Math.max(0,+s.top||0),right:Math.max(0,+s.right||0),bottom:Math.max(0,+s.bottom||0),left:Math.max(0,+s.left||0)};
  }
  if(t.seatLayout?.mode==="manual"&&Array.isArray(t.seatLayout?.manual)&&t.seatLayout.manual.length){
    const w=t.width/2+28,h=t.height/2+28;
    const c={top:0,right:0,bottom:0,left:0};
    t.seatLayout.manual.forEach(p=>{
      const nx=Math.abs(p.x)/(w||1), ny=Math.abs(p.y)/(h||1);
      if(ny>=nx){ if(p.y<0)c.top++; else c.bottom++; }
      else { if(p.x>0)c.right++; else c.left++; }
    });
    return c;
  }
  if(t.seatLayout?.mode==="longSides"){
    const a=Math.ceil(seats/2),b=Math.max(0,seats-a);
    return (t.width||0)>=(t.height||0) ? {top:a,right:0,bottom:b,left:0} : {top:0,right:a,bottom:0,left:b};
  }
  const w=t.width/2+28,h=t.height/2+28,lens=[2*w,2*h,2*w,2*h],sum=lens.reduce((s,v)=>s+v,0);
  const raw=lens.map(v=>seats*v/sum),cnt=raw.map(v=>Math.floor(v));
  let rem=seats-cnt.reduce((s,v)=>s+v,0);
  const order=raw.map((v,i)=>({i,f:v-cnt[i]})).sort((a,b)=>b.f-a.f);
  for(let i=0;i<rem;i++)cnt[order[i%order.length].i]++;
  return {top:cnt[0],right:cnt[1],bottom:cnt[2],left:cnt[3]};
}

function autoSizeRectTable(t){
  if(t.shape!=="rect"||t.autoSize===false)return t;
  const c=getRectSeatCounts(t);
  const span=n=>Math.max(0,n-1)*CHAIR_SPACING;
  const targetW=Math.max(90,Math.min(480,span(Math.max(c.top,c.bottom))+TABLE_END_OVERHANG*2));
  const targetH=Math.max(44,Math.min(520,span(Math.max(c.left,c.right))+TABLE_END_OVERHANG*2));
  return {...t,width:Math.round(targetW),height:Math.round(targetH)};
}

function compareGuestByFirstName(a,b){
  const na=(a||"").trim().replace(/\s+/g," ");
  const nb=(b||"").trim().replace(/\s+/g," ");
  const fa=na.split(" ")[0]||na, fb=nb.split(" ")[0]||nb;
  const byFirst=fa.localeCompare(fb,"fr",{sensitivity:"base"});
  if(byFirst!==0)return byFirst;
  return na.localeCompare(nb,"fr",{sensitivity:"base"});
}

function migrateSnapshotData(rawData){
  const d = rawData && typeof rawData==="object" ? deepClone(rawData) : {};
  const zones = Array.isArray(d.zones) && d.zones.length ? d.zones : deepClone(DEFAULT_ZONES);
  const activeZone = zones.some(z=>z?.id===d.activeZone) ? d.activeZone : zones[0]?.id || "z1";
  const venueEls = d.venueEls && typeof d.venueEls==="object" ? d.venueEls : {};
  const tables = d.tables && typeof d.tables==="object" ? d.tables : {};
  const tableGroupsRaw = d.tableGroups && typeof d.tableGroups==="object" ? d.tableGroups : {};
  const guestEvents = d.guestEvents && typeof d.guestEvents==="object" ? d.guestEvents : {};
  const assignments = d.assignments && typeof d.assignments==="object" ? d.assignments : {};
  const zoomState = d.zoomState && typeof d.zoomState==="object" ? d.zoomState : {};
  const guests = Array.isArray(d.guests) ? d.guests.filter(g=>typeof g==="string"&&g.trim()) : [];
  const groups = Array.isArray(d.groups) ? d.groups.filter(g=>g&&g.id&&g.name) : [];
  const guestGroups = d.guestGroups && typeof d.guestGroups==="object" ? d.guestGroups : {};
  const planVersions = Array.isArray(d.planVersions) ? d.planVersions : [];
  const currentPlanVersionId = d.currentPlanVersionId || null;
  const tableIdsByZone = Object.fromEntries(Object.entries(tables).map(([zid,arr])=>[
    zid,
    new Set((Array.isArray(arr)?arr:[]).map(t=>t?.id).filter(Boolean))
  ]));
  const tableGroups = {};
  Object.keys(tables).forEach(zid=>{
    const src = Array.isArray(tableGroupsRaw[zid]) ? tableGroupsRaw[zid] : [];
    tableGroups[zid] = src.map((g,i)=>{
      const ids = Array.isArray(g?.tableIds) ? g.tableIds.filter(tid=>tableIdsByZone[zid]?.has(tid)) : [];
      const uniq = Array.from(new Set(ids));
      return {
        id: g?.id || uid(),
        name: (g?.name||`Groupe ${i+1}`).toString(),
        tableIds: uniq,
      };
    }).filter(g=>g.tableIds.length>=2);
  });
  return {
    guests,
    groups,
    guestGroups,
    guestEvents,
    zones,
    activeZone,
    venueEls,
    tables,
    tableGroups,
    assignments,
    zoomState,
    checkpoints: Array.isArray(d.checkpoints)?d.checkpoints:[],
    auditLog: Array.isArray(d.auditLog)?d.auditLog:[],
    planVersions,
    currentPlanVersionId,
    prestataires: Array.isArray(d.prestataires)?d.prestataires:[],
    meta: {
      stateVersion: Number.isFinite(+d?.meta?.stateVersion)?+d.meta.stateVersion:1,
      processedCommandIds: Array.isArray(d?.meta?.processedCommandIds)?d.meta.processedCommandIds.filter(Boolean):[],
    },
  };
}

function validateState(state){
  const errors=[], warnings=[];
  if(!state || typeof state!=="object"){return {errors:["Etat invalide"],warnings};}
  if(!Array.isArray(state.guests)) errors.push("guests doit être un tableau.");
  if(!Array.isArray(state.zones) || !state.zones.length) errors.push("Au moins une zone est requise.");
  if(!state.venueEls || typeof state.venueEls!=="object") errors.push("venueEls invalide.");
  if(!state.tables || typeof state.tables!=="object") errors.push("tables invalide.");
  if(state.tableGroups && typeof state.tableGroups!=="object") errors.push("tableGroups invalide.");
  if(!state.assignments || typeof state.assignments!=="object") errors.push("assignments invalide.");
  if(!state.zoomState || typeof state.zoomState!=="object") errors.push("zoomState invalide.");
  if(state.groups && !Array.isArray(state.groups)) errors.push("groups invalide.");
  if(state.guestGroups && typeof state.guestGroups!=="object") errors.push("guestGroups invalide.");

  const zoneIds = new Set((state.zones||[]).map(z=>z?.id).filter(Boolean));
  if(state.activeZone && !zoneIds.has(state.activeZone)) warnings.push("activeZone absent des zones.");

  const guests = Array.isArray(state.guests)?state.guests:[];
  const seenGuests = new Set();
  guests.forEach(g=>{
    const key=(g||"").trim().toLowerCase();
    if(!key)return;
    if(seenGuests.has(key)) warnings.push(`Invité dupliqué: ${g}`);
    seenGuests.add(key);
  });

  const tableMap = new Map();
  Object.entries(state.tables||{}).forEach(([zid,arr])=>{
    if(!zoneIds.has(zid)) warnings.push(`Tables de zone inconnue: ${zid}`);
    (Array.isArray(arr)?arr:[]).forEach(t=>{
      if(!t?.id)return;
      if(tableMap.has(t.id)) warnings.push(`ID table dupliqué: ${t.id}`);
      tableMap.set(t.id,t);
    });
  });
  if(state.tableGroups && typeof state.tableGroups==="object"){
    Object.entries(state.tableGroups).forEach(([zid,arr])=>{
      if(!zoneIds.has(zid)) warnings.push(`Groupes de tables de zone inconnue: ${zid}`);
      if(!Array.isArray(arr)) return;
      const seenGroup = new Set();
      const seenTables = new Set();
      arr.forEach(g=>{
        if(!g?.id) return;
        if(seenGroup.has(g.id)) warnings.push(`ID groupe de table dupliqué: ${g.id}`);
        seenGroup.add(g.id);
        (Array.isArray(g.tableIds)?g.tableIds:[]).forEach(tid=>{
          if(!tableMap.has(tid)) warnings.push(`Table introuvable dans groupe ${g.id}: ${tid}`);
          const key=`${zid}:${tid}`;
          if(seenTables.has(key)) warnings.push(`Table présente dans plusieurs groupes: ${tid}`);
          seenTables.add(key);
        });
      });
    });
  }

  const assignedGuests = new Set();
  const groupIds = new Set((state.groups||[]).map(g=>g.id));
  Object.entries(state.guestGroups||{}).forEach(([guestName,gid])=>{
    if(!guests.includes(guestName)) warnings.push(`guestGroups orphelin: ${guestName}`);
    if(gid && !groupIds.has(gid)) warnings.push(`groupe introuvable pour ${guestName}`);
  });
  Object.entries(state.assignments||{}).forEach(([k,g])=>{
    const [tid,idxRaw] = k.split("-");
    const idx = Number(idxRaw);
    const t = tableMap.get(tid);
    if(!t){warnings.push(`Assignation orpheline: ${k}`);return;}
    const seatCount = getChairs(t).length;
    if(!Number.isFinite(idx) || idx<0 || idx>=seatCount) warnings.push(`Siège hors limites: ${k}`);
    if(!guests.includes(g)) warnings.push(`Invité assigné introuvable: ${g}`);
    if(assignedGuests.has(g)) warnings.push(`Invité assigné plusieurs fois: ${g}`);
    assignedGuests.add(g);
  });

  tableMap.forEach(t=>{
    if(t.shape==="u"){
      const w=getUEffectiveUWidth(t), h=Math.max(120,t.uHeight||220), seats=Math.max(0,t.seats||0);
      const density = seats/Math.max(1,(2*(w+h)));
      if(density>0.085) warnings.push(`Densité élevée table U (${t.name||t.id}).`);
    }
    const chairs=getChairs(t);
    for(let i=0;i<chairs.length;i++){
      for(let j=i+1;j<chairs.length;j++){
        const dx=chairs[i].x-chairs[j].x, dy=chairs[i].y-chairs[j].y;
        if(Math.hypot(dx,dy)<CHAIR_R*1.3){warnings.push(`Chevauchement sièges sur ${t.name||t.id}`); i=chairs.length; break;}
      }
    }
  });

  return {errors:[...new Set(errors)],warnings:[...new Set(warnings)]};
}

function stateDiagnostics(state){
  const allTables = Object.values(state.tables||{}).flat();
  const totalSeats = allTables.reduce((s,t)=>s+getChairs(t).length,0);
  const assigned = Object.values(state.assignments||{});
  const uniqueAssigned = new Set(assigned);
  const unplaced = (state.guests||[]).filter(g=>!uniqueAssigned.has(g));
  const saturation = allTables.map(t=>{
    const cap = getChairs(t).length;
    const occ = Object.keys(state.assignments||{}).filter(k=>k.startsWith(t.id+"-")).length;
    return {tableId:t.id,name:t.name,occupancy:occ,capacity:cap,ratio:cap?occ/cap:0};
  });
  return {capacity:totalSeats,placed:uniqueAssigned.size,unplaced:unplaced.length,conflicts:Math.max(0,assigned.length-uniqueAssigned.size),tables:saturation};
}

function guestToTableMapFromAssignments(assignments){
  const m={};
  Object.entries(assignments||{}).forEach(([k,g])=>{
    const tid = k.split("-")[0];
    m[g]=tid;
  });
  return m;
}

function stripVersionPayload(state){
  const s=deepClone(state);
  delete s.planVersions;
  delete s.currentPlanVersionId;
  return s;
}

    tables:deepClone(tables),
    tableGroups:deepClone(tableGroups),
    assignments:deepClone(assignments),
    zoomState:deepClone(zoomState),
    checkpoints:deepClone(checkpoints),
    auditLog:deepClone(auditLog),
    planVersions:deepClone(planVersions),
    currentPlanVersionId,
    meta:{stateVersion,processedCommandIds:Array.from(processedCommandIdsRef.current)},
  }),[guests,groups,guestGroups,guestEvents,zones,activeZone,venueEls,tables,tableGroups,assignments,zoomState,checkpoints,auditLog,planVersions,currentPlanVersionId,stateVersion]);

  const applyState = useCallback((next,{clearSelection=true}={})=>{
    const m = migrateSnapshotData(next);
    setGuests(m.guests); setGroups(m.groups||[]); setGuestGroups(m.guestGroups||{}); setGuestEvents(m.guestEvents); setZones(m.zones); setActiveZone(m.activeZone);
    setVenueEls(m.venueEls); setTables(m.tables); setTableGroups(m.tableGroups||{}); setAssignments(m.assignments); setZoomState(m.zoomState);
    setCheckpoints(m.checkpoints||[]); setAuditLog((m.auditLog||[]).slice(-MAX_AUDIT_LOG));
    setPlanVersions(m.planVersions||[]); setCurrentPlanVersionId(m.currentPlanVersionId||null);
    setStateVersion(Number.isFinite(+m?.meta?.stateVersion)?+m.meta.stateVersion:1);
    processedCommandIdsRef.current = new Set(m?.meta?.processedCommandIds||[]);
    if(clearSelection){ setSelEl(null); setSelTable(null); setEditTable(null); setSelectedTableIds([]); }
  },[]);

  const pushHistory = useCallback((prevState,meta={})=>{
    historyRef.current.push({state:deepClone(prevState),meta:{...meta,at:nowIso()}});
    if(historyRef.current.length>MAX_HISTORY) historyRef.current.shift();
    futureRef.current=[];
    setHistoryTick(v=>v+1);
  },[]);

  const undo = useCallback(()=>{
    if(!historyRef.current.length) return {ok:false,errors:["Aucun undo disponible"]};
    const cur = collectState();
    const prev = historyRef.current.pop();
    futureRef.current.push({state:cur,meta:{at:nowIso(),reason:"undo"}});
    applyState(prev.state,{clearSelection:false});
    setCommandAlerts([]);
    setHistoryTick(v=>v+1);
    return {ok:true};
  },[collectState,applyState]);

  const redo = useCallback(()=>{
    if(!futureRef.current.length) return {ok:false,errors:["Aucun redo disponible"]};
    const cur = collectState();
    const next = futureRef.current.pop();
    historyRef.current.push({state:cur,meta:{at:nowIso(),reason:"redo"}});
    applyState(next.state,{clearSelection:false});
    setCommandAlerts([]);
    setHistoryTick(v=>v+1);
    return {ok:true};
  },[collectState,applyState]);

  const autoFixState = useCallback(st=>{
    const next = deepClone(st);
    const tableMap = new Map();
    Object.values(next.tables||{}).flat().forEach(t=>tableMap.set(t.id,t));
    const newAssignments = {};
    const seenGuests = new Set();
    Object.entries(next.assignments||{}).forEach(([k,g])=>{
      const [tid,idxRaw]=k.split("-"); const idx=+idxRaw; const t=tableMap.get(tid);
      if(!t) return;
      const cap=getChairs(t).length;
      if(!Number.isFinite(idx) || idx<0 || idx>=cap) return;
      if(!next.guests.includes(g)) return;
      if(seenGuests.has(g)) return;
      seenGuests.add(g);
      newAssignments[k]=g;
    });
    next.assignments = newAssignments;
    return next;
  },[]);

  const findTable = (st, tableId, zoneId=null)=>{
    if(zoneId){
      const arr=st.tables?.[zoneId]||[];
      return {zoneId,idx:arr.findIndex(t=>t.id===tableId),arr};
    }
    for(const zid of Object.keys(st.tables||{})){
      const arr=st.tables[zid]||[]; const idx=arr.findIndex(t=>t.id===tableId);
      if(idx>=0) return {zoneId:zid,idx,arr};
    }
    return null;
  };

  const applyCommandToState = useCallback((st,cmd)=>{
    const next = deepClone(st);
    const c = cmd || {};
    const t = c.type;
    const payload = c.payload||{};
    const targetId = c.targetId||payload.targetId||null;
    const diffSummary = [];
    const errors=[], warnings=[];

    if(!t) return {ok:false,errors:["Commande sans type"],warnings,diffSummary,state:st};
    switch(t){
      case "ADD_GUEST": {
        const name=(payload.name||"").trim();
        if(!name){errors.push("name requis");break;}
        if(!next.guests.includes(name)){ next.guests.push(name); diffSummary.push(`guest+ ${name}`); }
        else warnings.push("Invité déjà présent.");
        break;
      }
      case "REMOVE_GUEST": {
        const name=(payload.name||targetId||"").trim();
        if(!name){errors.push("name requis");break;}
        next.guests = next.guests.filter(g=>g!==name);
        Object.keys(next.assignments||{}).forEach(k=>{ if(next.assignments[k]===name) delete next.assignments[k]; });
        delete next.guestEvents?.[name];
        diffSummary.push(`guest- ${name}`);
        break;
      }
      case "ADD_GROUP": {
        const name=(payload.name||"").trim();
        if(!name){errors.push("name requis");break;}
        const id=payload.id||uid();
        if((next.groups||[]).some(g=>g.id===id)){errors.push("group id déjà utilisé");break;}
        const type=GROUP_TYPE_OPTIONS.includes(payload.type)?payload.type:"autre";
        const color=payload.color||"#4C78A8";
        next.groups=[...(next.groups||[]),{id,name,type,color,lockedCoreMemberIds:[]}];
        diffSummary.push(`group+ ${name}`);
        break;
      }
      case "UPDATE_GROUP": {
        const gid=payload.groupId||targetId;
        const i=(next.groups||[]).findIndex(g=>g.id===gid);
        if(i<0){errors.push("groupe introuvable");break;}
        next.groups[i]={...next.groups[i],...(payload.patch||{})};
        diffSummary.push(`group~ ${gid}`);
        break;
      }
      case "REMOVE_GROUP": {
        const gid=payload.groupId||targetId;
        next.groups=(next.groups||[]).filter(g=>g.id!==gid);
        Object.keys(next.guestGroups||{}).forEach(guest=>{ if(next.guestGroups[guest]===gid) delete next.guestGroups[guest]; });
        diffSummary.push(`group- ${gid}`);
        break;
      }
      case "ASSIGN_GUEST_GROUP": {
        const guest=payload.guest, gid=payload.groupId||null;
        if(!guest){errors.push("guest requis");break;}
        if(!next.guests.includes(guest)){errors.push("guest introuvable");break;}
        if(gid && !(next.groups||[]).some(g=>g.id===gid)){errors.push("groupId introuvable");break;}
        next.guestGroups = {...(next.guestGroups||{})};
        if(!gid) delete next.guestGroups[guest]; else next.guestGroups[guest]=gid;
        diffSummary.push(`guestGroup ${guest}->${gid||"none"}`);
        break;
      }
      case "MOVE_GROUP_TO_TABLE": {
        const gid=payload.groupId||targetId, tableId=payload.tableId;
        if(!gid || !tableId){errors.push("groupId et tableId requis");break;}
        const members=(next.guests||[]).filter(g=>next.guestGroups?.[g]===gid);
        if(!members.length){warnings.push("Groupe vide.");break;}
        const found=findTable(next,tableId,payload.zoneId||null);
        if(!found||found.idx<0){errors.push("table introuvable");break;}
        const t=found.arr[found.idx], cap=getChairs(t).length;
        const occupied=new Set(Object.keys(next.assignments||{}).filter(k=>k.startsWith(tableId+"-")).map(k=>+k.split("-")[1]));
        const free=Array.from({length:cap},(_,i)=>i).filter(i=>!occupied.has(i));
        if(free.length<members.length){errors.push("Pas assez de sièges libres pour le groupe.");break;}
        members.forEach(m=>{Object.keys(next.assignments||{}).forEach(k=>{if(next.assignments[k]===m)delete next.assignments[k];});});
        members.forEach((m,i)=>{next.assignments[seatKey(tableId,free[i])] = m;});
        diffSummary.push(`groupMove ${gid}->${tableId}`);
        break;
      }
      case "ADD_ZONE": {
        const name=(payload.name||"").trim();
        if(!name){errors.push("name requis");break;}
        const id=payload.id||uid();
        if(next.zones.some(z=>z.id===id)){errors.push("zone id déjà utilisé");break;}
        const color=payload.color||"#8B7355";
        next.zones.push({id,name,color}); next.venueEls[id]=[]; next.tables[id]=[];
        diffSummary.push(`zone+ ${name}`);
        break;
      }
      case "REMOVE_ZONE": {
        const zid = payload.zoneId||targetId;
        if(!zid){errors.push("zoneId requis");break;}
        if((next.zones||[]).length<=1){errors.push("Impossible de supprimer la dernière zone.");break;}
        next.zones = next.zones.filter(z=>z.id!==zid);
        delete next.venueEls[zid]; delete next.tables[zid];
        if(next.activeZone===zid) next.activeZone = next.zones[0]?.id || next.activeZone;
        diffSummary.push(`zone- ${zid}`);
        break;
      }
      case "SET_ACTIVE_ZONE": {
        const zid = payload.zoneId||targetId;
        if(!zid || !next.zones.some(z=>z.id===zid)){errors.push("zoneId invalide");break;}
        next.activeZone = zid; diffSummary.push(`activeZone=${zid}`); break;
      }
      case "ADD_TABLE": {
        const zid = payload.zoneId||next.activeZone;
        if(!next.tables[zid]) next.tables[zid]=[];
        const table = payload.table ? deepClone(payload.table) : null;
        if(!table){errors.push("payload.table requis");break;}
        if(!table.id) table.id=uid();
        if(next.tables[zid].some(tb=>tb.id===table.id)){errors.push("table id déjà utilisé");break;}
        next.tables[zid].push(table);
        diffSummary.push(`table+ ${table.id}`);
        break;
      }
      case "UPDATE_TABLE":
      case "MOVE_TABLE":
      case "ROTATE_TABLE": {
        const tableId = payload.tableId||targetId;
        const found = findTable(next,tableId,payload.zoneId||null);
        if(!found || found.idx<0){errors.push("table introuvable");break;}
        const patch = t==="MOVE_TABLE" ? {x:+payload.x,y:+payload.y} : t==="ROTATE_TABLE" ? {rotation:+payload.rotation||0} : (payload.patch||{});
        const current = found.arr[found.idx];
        const updated = autoSizeRectTable({...current,...patch});
        found.arr[found.idx]=updated;
        const cap=getChairs(updated).length;
        Object.keys(next.assignments||{}).forEach(k=>{
          if(!k.startsWith(updated.id+"-")) return;
          const idx=+k.slice(updated.id.length+1);
          if(!Number.isFinite(idx) || idx>=cap) delete next.assignments[k];
        });
        diffSummary.push(`table~ ${updated.id}`);
        break;
      }
      case "REMOVE_TABLE": {
        const tableId = payload.tableId||targetId;
        const found = findTable(next,tableId,payload.zoneId||null);
        if(!found || found.idx<0){errors.push("table introuvable");break;}
        found.arr.splice(found.idx,1);
        Object.keys(next.assignments||{}).forEach(k=>{ if(k.startsWith(tableId+"-")) delete next.assignments[k]; });
        diffSummary.push(`table- ${tableId}`);
        break;
      }
      case "ASSIGN_GUEST": {
        const tableId=payload.tableId||targetId, seatIndex=+payload.seatIndex, guest=payload.guest;
        if(!tableId || !Number.isFinite(seatIndex) || !guest){errors.push("tableId, seatIndex, guest requis");break;}
        const found=findTable(next,tableId,payload.zoneId||null);
        if(!found || found.idx<0){errors.push("table introuvable");break;}
        if(!next.guests.includes(guest)){errors.push("invité introuvable");break;}
        const cap=getChairs(found.arr[found.idx]).length;
        if(seatIndex<0 || seatIndex>=cap){errors.push("seatIndex hors limites");break;}
        Object.keys(next.assignments||{}).forEach(k=>{ if(next.assignments[k]===guest) delete next.assignments[k]; });
        next.assignments[seatKey(tableId,seatIndex)] = guest;
        diffSummary.push(`assign ${guest} -> ${tableId}#${seatIndex}`);
        break;
      }
      case "UNASSIGN_GUEST": {
        const guest = payload.guest||null;
        const tableId=payload.tableId||targetId, seatIndex=Number.isFinite(+payload.seatIndex)?+payload.seatIndex:null;
        if(guest){
          Object.keys(next.assignments||{}).forEach(k=>{ if(next.assignments[k]===guest) delete next.assignments[k]; });
          diffSummary.push(`unassign ${guest}`);
        } else if(tableId && seatIndex!==null){
          delete next.assignments[seatKey(tableId,seatIndex)];
          diffSummary.push(`unassign ${tableId}#${seatIndex}`);
        } else errors.push("guest ou (tableId+seatIndex) requis");
        break;
      }
      case "ADD_VENUE_ELEMENT": {
        const zid=payload.zoneId||next.activeZone;
        if(!next.venueEls[zid]) next.venueEls[zid]=[];
        const el = deepClone(payload.element||{});
        if(!el.id) el.id=uid();
        next.venueEls[zid].push(el); diffSummary.push(`venue+ ${el.id}`); break;
      }
      case "UPDATE_VENUE_ELEMENT": {
        const zid=payload.zoneId||next.activeZone, id=payload.elementId||targetId;
        const arr=next.venueEls[zid]||[]; const i=arr.findIndex(e=>e.id===id);
        if(i<0){errors.push("élément introuvable");break;}
        arr[i]={...arr[i],...(payload.patch||{})}; diffSummary.push(`venue~ ${id}`); break;
      }
      case "REMOVE_VENUE_ELEMENT": {
        const zid=payload.zoneId||next.activeZone, id=payload.elementId||targetId;
        const arr=next.venueEls[zid]||[]; const i=arr.findIndex(e=>e.id===id);
        if(i<0){errors.push("élément introuvable");break;}
        arr.splice(i,1); diffSummary.push(`venue- ${id}`); break;
      }
      case "IMPORT_SNAPSHOT": {
        const snap = payload.snapshot;
        if(!snap || typeof snap!=="object"){errors.push("snapshot invalide");break;}
        return {ok:true,errors,warnings,diffSummary:["snapshot import"],state:migrateSnapshotData(snap)};
      }
      case "CREATE_CHECKPOINT": {
        const name=(payload.name||`Checkpoint ${new Date().toLocaleTimeString("fr-FR")}`).trim();
        next.checkpoints = [...(next.checkpoints||[]),{id:uid(),name,createdAt:nowIso(),state:deepClone({...next,auditLog:[]})}].slice(-30);
        diffSummary.push(`checkpoint+ ${name}`); break;
      }
      case "RESTORE_CHECKPOINT": {
        const cpId=payload.checkpointId||targetId;
        const cp=(next.checkpoints||[]).find(c=>c.id===cpId);
        if(!cp){errors.push("checkpoint introuvable");break;}
        const restored = migrateSnapshotData(cp.state);
        restored.checkpoints = next.checkpoints;
        restored.auditLog = next.auditLog;
        restored.meta.stateVersion = (next.meta?.stateVersion||1)+1;
        return {ok:true,errors,warnings,diffSummary:["checkpoint restore"],state:restored};
      }
      case "AUTO_LAYOUT_PRESET": {
        if(payload.preset!=="u_modular"){errors.push("preset non supporté");break;}
        const zid=payload.zoneId||next.activeZone;
        const c=payload.center||{x:450,y:350};
        const buildRectPreset=(name,x,y,width,height,colorIdx,sides)=>({
          id:uid(),name,shape:"rect",x,y,width,height,seats:Object.values(sides).reduce((s,v)=>s+v,0),colorIdx,rotation:90,autoSize:false,seatLayout:{mode:"custom",sides}
        });
        const topLen=760, branchLen=560, depth=72, angleSize=110;
        const topY=c.y-250, leftAngleX=c.x-topLen/2-angleSize/2, rightAngleX=c.x+topLen/2+angleSize/2, branchY=topY+angleSize/2+branchLen/2;
        const base=(next.tables[zid]||[]).length;
        const mods=[
          buildRectPreset("Branche gauche",leftAngleX,branchY,depth,branchLen,base,{top:0,right:10,bottom:1,left:10}),
          buildRectPreset("Angle haut gauche",leftAngleX,topY,angleSize,angleSize,base+1,{top:2,right:0,bottom:1,left:1}),
          buildRectPreset("Fond",c.x,topY,topLen,depth,base+2,{top:16,right:0,bottom:16,left:0}),
          buildRectPreset("Angle haut droit",rightAngleX,topY,angleSize,angleSize,base+3,{top:2,right:1,bottom:1,left:0}),
          buildRectPreset("Branche droite",rightAngleX,branchY,depth,branchLen,base+4,{top:0,right:10,bottom:1,left:10}),
        ];
        next.tables[zid]=[...(next.tables[zid]||[]),...mods];
        diffSummary.push("preset u_modular");
        break;
      }
      case "CREATE_PLAN_VERSION": {
        const name=(payload.name||`Version ${new Date().toLocaleString("fr-FR")}`).trim();
        const status=PLAN_VERSION_STATUSES.includes(payload.status)?payload.status:"draft";
        const id=payload.id||uid();
        const version = {id,name,status,createdAt:nowIso(),stateVersion:next.meta?.stateVersion||1,snapshot:stripVersionPayload(next)};
        next.planVersions=[...(next.planVersions||[]),version].slice(-80);
        next.currentPlanVersionId=id;
        diffSummary.push(`planVersion+ ${name}`);
        break;
      }
      case "RESTORE_PLAN_VERSION": {
        const vid=payload.versionId||targetId;
        const v=(next.planVersions||[]).find(x=>x.id===vid);
        if(!v){errors.push("version introuvable");break;}
        const restored=migrateSnapshotData({...v.snapshot,planVersions:next.planVersions,currentPlanVersionId:vid});
        return {ok:true,errors,warnings,diffSummary:["planVersion restore"],state:restored};
      }
      case "SET_PLAN_VERSION_STATUS": {
        const vid=payload.versionId||targetId;
        const status=payload.status;
        if(!PLAN_VERSION_STATUSES.includes(status)){errors.push("status invalide");break;}
        const i=(next.planVersions||[]).findIndex(v=>v.id===vid);
        if(i<0){errors.push("version introuvable");break;}
        next.planVersions[i]={...next.planVersions[i],status};
        diffSummary.push(`planVersion status ${vid}=${status}`);
        break;
      }
      default: errors.push(`Commande non supportée: ${t}`);
    }

    return {ok:errors.length===0,errors,warnings,diffSummary,state:next};
  },[]);

  const executeCommands = useCallback((commands,opts={})=>{
    const list = Array.isArray(commands)?commands:[commands];
    const dryRun = !!opts.dryRun;
    const autoFix = opts.autoFix!==false;
    let working = collectState();
    const results = [];
    const batchErrors=[], batchWarnings=[], batchDiff=[];
    const processedIdsBatch = [];
    for(const cRaw of list){
      const c = {version:"1.0",timestamp:nowIso(),...cRaw};
      const cId = c.clientCommandId||null;
      if(cId && processedCommandIdsRef.current.has(cId)){
        results.push({status:"skipped",applied:false,errors:[],warnings:["Commande déjà traitée"],diffSummary:[]});
        continue;
      }
      const r = applyCommandToState(working,c);
      results.push({status:r.ok?"ok":"error",applied:r.ok,errors:r.errors,warnings:r.warnings,diffSummary:r.diffSummary});
      if(r.ok){
        working = r.state;
        if(cId) processedIdsBatch.push(cId);
        batchDiff.push(...r.diffSummary);
      } else {
        batchErrors.push(...r.errors);
      }
      batchWarnings.push(...r.warnings);
    }
    if(autoFix) working = autoFixState(working);
    const val = validateState(working);
    batchErrors.push(...val.errors);
    batchWarnings.push(...val.warnings);
    const ok = batchErrors.length===0;
    const prev = collectState();
    const currentVersion = prev.meta?.stateVersion||stateVersion||1;
    const nextVersion = ok && !dryRun ? currentVersion+1 : currentVersion;
    if(!dryRun && ok){
      pushHistory(prev,{source:opts.source||"api",commands:list.length});
      processedIdsBatch.forEach(id=>processedCommandIdsRef.current.add(id));
      working.meta = working.meta||{};
      working.meta.stateVersion = nextVersion;
      working.meta.processedCommandIds = Array.from(processedCommandIdsRef.current);
      const stamp = nowIso();
      const auditEntries = list.map((c,i)=>({
        at:stamp,
        type:c?.type||"UNKNOWN",
        targetId:c?.targetId||null,
        clientCommandId:c?.clientCommandId||null,
        applied:results[i]?.applied||false,
        errors:results[i]?.errors||[],
        warnings:results[i]?.warnings||[],
        diffSummary:results[i]?.diffSummary||[],
      }));
      working.auditLog = [...(working.auditLog||[]),...auditEntries].slice(-MAX_AUDIT_LOG);
      applyState(working,{clearSelection:false});
      setCommandAlerts(batchWarnings.slice(0,6));
    }
    return {
      status: ok ? "ok" : "error",
      applied: !dryRun && ok,
      errors:[...new Set(batchErrors)],
      warnings:[...new Set(batchWarnings)],
      diffSummary:[...new Set(batchDiff)],
      stateVersion: nextVersion,
      results,
      diagnostics:stateDiagnostics(working),
    };
  },[collectState,applyCommandToState,autoFixState,applyState,pushHistory,stateVersion]);

  const exportAuditLog = useCallback(()=>{
    const lines = (auditLog||[]).map(r=>JSON.stringify(r)).join("\n");
    return lines;
  },[auditLog]);

  const applyCommand = useCallback((command,opts={})=>executeCommands([command],opts),[executeCommands]);

  const exportSnapshotObject = useCallback(()=>({
    version:SNAPSHOT_VERSION,
    exportedAt:nowIso(),
    data:collectState(),
  }),[collectState]);

  const getStableIds = useCallback(()=>{
    const st=collectState();
    const zoneIds=(st.zones||[]).map(z=>z.id);
    const tableIds=Object.values(st.tables||{}).flat().map(t=>t.id);
    const groupIds=(st.groups||[]).map(g=>g.id);
    const guestIds=(st.guests||[]).map(g=>({name:g,id:guestIdFromName(g)}));
    const seatIds=Object.values(st.tables||{}).flat().flatMap(t=>getChairs(t).map((_,i)=>({tableId:t.id,seatIndex:i,seatId:seatKey(t.id,i)})));
    return {zoneIds,tableIds,groupIds,guestIds,seatIds};
  },[collectState]);

  const downloadAuditLog = useCallback(()=>{
    const text = exportAuditLog();
    const blob = new Blob([text],{type:"application/x-ndjson"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url;
    a.download=`plan-mariage-grotteaux-audit-${new Date().toISOString().slice(0,10)}.jsonl`;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  },[exportAuditLog]);

  const createCheckpoint = useCallback((name="Checkpoint manuel")=>{
    const st=collectState();
    const cp={id:uid(),name,createdAt:nowIso(),state:deepClone({...st,auditLog:[]})};
    setCheckpoints(prev=>[...prev,cp].slice(-30));
    setCommandAlerts([`Checkpoint créé: ${name}`]);
    return cp;
  },[collectState]);

  useEffect(()=>{
    window.weddingPlannerAPI = {
      version:"1.0",
      applyCommand,
      executeCommands,
      validateState: (state)=>validateState(state || collectState()),
      exportAuditLog,
      exportSnapshot: exportSnapshotObject,
      getState: collectState,
      getStableIds,
      getDiagnostics: ()=>stateDiagnostics(collectState()),
      getVersionDiff,
      undo, redo,
      createCheckpoint,
      createPlanVersion,
      restorePlanVersion,
    };
    return ()=>{ try{ delete window.weddingPlannerAPI; }catch(_){ window.weddingPlannerAPI=undefined; } };
  },[applyCommand,executeCommands,collectState,exportAuditLog,exportSnapshotObject,getStableIds,undo,redo,createCheckpoint,getVersionDiff,createPlanVersion,restorePlanVersion]);

  /* ─ Fond realiste Grotteaux (cadastre + OSM) ─ */
  const geoToCanvas = (lon,lat)=>{
    const c=GROTTEAUX_REALISTIC_GEO;
    return {x:c.originX + (lon-c.minLon)*c.scale, y:c.originY + (c.maxLat-lat)*c.scale};
  };

    const a={...assignments};Object.keys(a).forEach(k=>{if(a[k]===n)delete a[k]});a[tid+"-"+si]=n;setAssignments(a);
  };
  const unassign=n=>{if(!canEdit)return;const a={...assignments};Object.keys(a).forEach(k=>{if(a[k]===n)delete a[k]});setAssignments(a);};

  /* ─ Zones ─ */
  const addZone=()=>{const n=newZoneName.trim();if(!n)return;const id=uid();const cs=["#8B7355","#B8A070","#6B8E5B","#7B6B8E","#8E6B6B"];
    setZones([...zones,{id,name:n,color:cs[zones.length%cs.length]}]);setVenueEls({...venueEls,[id]:[]});setTables({...tables,[id]:[]});setTableGroups({...tableGroups,[id]:[]});
    setNewZoneName("");setZoneModal(false);setActiveZone(id);};
  const removeZone=id=>{if(zones.length<=1)return;setZones(zones.filter(z=>z.id!==id));
    const ve={...venueEls};delete ve[id];setVenueEls(ve);const tb={...tables};delete tb[id];setTables(tb);const tg={...tableGroups};delete tg[id];setTableGroups(tg);
    if(activeZone===id)setActiveZone(zones.filter(z=>z.id!==id)[0]?.id);};

  /* ─ Fit ─ */
  const fitContent=()=>{
    const all=[...curVenue.map(e=>({x:e.x,y:e.y,w:e.w,h:e.h})),...curTables.map(t=>{
      const w=t.shape==="round"?t.radius*2:t.shape==="u"?getUEffectiveUWidth(t):t.shape==="corner"?Math.max(t.cornerW||180,t.thickness||60):t.width;
      const h=t.shape==="round"?t.radius*2:t.shape==="u"?t.uHeight:t.shape==="corner"?Math.max(t.cornerH||180,t.thickness||60):t.height;
      return{x:t.x,y:t.y,w:w+80,h:h+80};
    })];
    if(!all.length){setZP(1,50,20);return;}
    let x1=Infinity,y1=Infinity,x2=-Infinity,y2=-Infinity;
    all.forEach(e=>{x1=Math.min(x1,e.x-e.w/2);y1=Math.min(y1,e.y-e.h/2);x2=Math.max(x2,e.x+e.w/2);y2=Math.max(y2,e.y+e.h/2);});
    const r=containerRef.current?.getBoundingClientRect();if(!r)return;
    const cw=x2-x1+80,ch=y2-y1+80;
    const z=Math.min(r.width/cw,r.height/ch,2.5);
    setZP(Math.round(z*100)/100, (r.width-cw*z)/2-x1*z+40*z, (r.height-ch*z)/2-y1*z+40*z);
  };

  const sortedGuests=[...guests].sort(compareGuestByFirstName);
  const assignedSet=new Set(Object.values(assignments));
  const unassignedGuests=sortedGuests.filter(g=>!assignedSet.has(g));
  const sortedAssignedGuests=Array.from(assignedSet).sort(compareGuestByFirstName);
  const recapCounts = EVENT_CATEGORIES.map(c=>({
    ...c,
    count: guests.reduce((n,g)=>n + ((guestEvents[g]&&guestEvents[g][c.key])?1:0),0),
  }));
  const allTables=Object.values(tables).flat();
  const totalSeats=allTables.reduce((s,t)=>s+t.seats,0);
  const groupsWithStats=(groups||[]).map(gr=>{
    const members=guests.filter(g=>guestGroups[g]===gr.id);
    const tableSet=new Set(members.map(m=>{const sk=Object.keys(assignments).find(k=>assignments[k]===m);return sk?sk.split("-")[0]:null;}).filter(Boolean));
    return {...gr,members,tableSpread:tableSet.size};
  });
  const versionDiff = compareVersionA && compareVersionB ? getVersionDiff(compareVersionA,compareVersionB) : {moved:[],added:[],removed:[]};
  const editTbl=curTables.find(t=>t.id===editTable);
  const selectedTableSet = new Set(selectedTableIds);
  const selectedBelongingGroupIds = new Set((curTableGroups||[]).filter(g=>g.tableIds.some(id=>selectedTableSet.has(id))).map(g=>g.id));
  const selVE=curVenue.find(e=>e.id===selEl);
  const canEdit = !editLocked;
  const tableZoneMap = Object.fromEntries(Object.entries(tables||{}).flatMap(([zid,tbls])=>(tbls||[]).map(t=>[t.id,zid])));
  const tableById = Object.fromEntries(allTables.map(t=>[t.id,t]));
  const zoneById = Object.fromEntries((zones||[]).map(z=>[z.id,z]));
  const tableGuests = t => Object.entries(assignments||{})
    .filter(([k])=>k.startsWith(t.id+"-"))
    .sort(([a],[b])=>+a.split("-").pop()-+b.split("-").pop())
    .map(([k,g])=>({guest:g,seat:+k.split("-").pop()+1,events:EVENT_CATEGORIES.filter(ev=>guestEvents?.[g]?.[ev.key]).map(ev=>ev.label)}));
  const findGuestSeat = g => {
    const key = Object.keys(assignments||{}).find(k=>assignments[k]===g);
    if(!key) return null;
    const tableId = key.split("-")[0];
    const table = tableById[tableId];
    const zone = zoneById[tableZoneMap[tableId]];
    return table ? {key,tableId,table,zone,seat:+key.split("-").pop()+1} : null;
  };
  const normalizeSearch = v => (v||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const dayQuery = normalizeSearch(daySearch.trim());
  const dayGuestResults = dayQuery ? sortedGuests.filter(g=>normalizeSearch(g).includes(dayQuery)).slice(0,12) : [];
  const dayTableCards = allTables.map(t=>({table:t,zone:zoneById[tableZoneMap[t.id]],guests:tableGuests(t),capacity:getChairs(t).length})).sort((a,b)=>(a.zone?.name||"").localeCompare(b.zone?.name||"","fr",{sensitivity:"base"}) || (a.table.name||"").localeCompare(b.table.name||"","fr",{numeric:true,sensitivity:"base"}));
  const dayTimeline = prestataires
    .filter(p=>p.arrivalTime||p.setupTime||p.departureTime)
    .flatMap(p=>[
      p.arrivalTime&&{time:p.arrivalTime,label:"Arrivée",p},
      p.setupTime&&{time:p.setupTime,label:"Installation",p},
      p.departureTime&&{time:p.departureTime,label:"Départ",p},
    ].filter(Boolean))
    .sort((a,b)=>a.time.localeCompare(b.time));
  const dayIssues = [
    unassignedGuests.length ? `${unassignedGuests.length} invité(s) non placé(s)` : null,
    totalSeats < guests.length ? `${guests.length-totalSeats} place(s) manquante(s)` : null,
    allTables.filter(t=>tableGuests(t).length>getChairs(t).length).length ? "Table(s) surchargée(s)" : null,
  ].filter(Boolean);

  const gridSize=30*zoom, gx=panX%gridSize, gy=panY%gridSize;

  return (
    <div className="app-shell">

      {/* Header */}
      <div className="app-header">
        <div style={{display:"flex",alignItems:"baseline",gap:10}}>
          <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:300,margin:0,letterSpacing:1,color:"#5A4A3A"}}>Château des Grotteaux</h1>
          <span style={{fontSize:11,color:"#A09080",fontWeight:300,letterSpacing:2,textTransform:"uppercase"}}>Mariage · Léana & Antoine</span>
        </div>
        <div className="app-tabs">
          {[{k:"jourj",l:"Jour J"},{k:"seating",l:"Plan de table"},{k:"plan",l:"Plan du lieu"},{k:"guests",l:"Invités"},{k:"prestas",l:"Prestataires"},{k:"print",l:"Imprimer"}].map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)} style={{padding:"7px 16px",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:tab===t.k?500:400,fontFamily:"'Outfit',sans-serif",background:tab===t.k?"#FFFCF7":"transparent",color:tab===t.k?"#5A4A3A":"#A09080",boxShadow:tab===t.k?"0 1px 4px rgba(0,0,0,0.08)":"none",transition:"all 0.2s"}}>{t.l}</button>
          ))}
        </div>
        <div className="app-actions">
          <span>{guests.length} invités</span><span>{allTables.length} tables</span><span>{totalSeats} places</span>
          <span style={{color:unassignedGuests.length>0?"#C07050":"#6B8E6B",fontWeight:500}}>{unassignedGuests.length} non placé{unassignedGuests.length!==1?"s":""}</span>
          <button onClick={()=>{if(editLocked){if(confirm("Déverrouiller l'édition ? Les modifications seront sauvegardées automatiquement."))setEditLocked(false);}else setEditLocked(true);}} style={{border:`1px solid ${editLocked?"#D7A66A":"#8BAA78"}`,background:editLocked?"#FFF5E6":"#EEF8EA",borderRadius:6,padding:"3px 10px",fontSize:10,cursor:"pointer",color:editLocked?"#9A6A30":"#4F7A45",fontFamily:"'Outfit',sans-serif",fontWeight:600}}>{editLocked?"Edition verrouillée":"Edition ouverte"}</button>
          <button onClick={()=>undo()} disabled={!historyRef.current.length} style={{border:"1px solid #E8DDD0",background:historyRef.current.length?"#FFFCF7":"#F6F1EA",borderRadius:6,padding:"3px 10px",fontSize:10,cursor:historyRef.current.length?"pointer":"not-allowed",color:"#7A6A5A",fontFamily:"'Outfit',sans-serif"}}>Undo</button>
          <button onClick={()=>redo()} disabled={!futureRef.current.length} style={{border:"1px solid #E8DDD0",background:futureRef.current.length?"#FFFCF7":"#F6F1EA",borderRadius:6,padding:"3px 10px",fontSize:10,cursor:futureRef.current.length?"pointer":"not-allowed",color:"#7A6A5A",fontFamily:"'Outfit',sans-serif"}}>Redo</button>
          <button onClick={()=>createCheckpoint("Checkpoint manuel")} style={{border:"1px solid #E8DDD0",background:"#FFFCF7",borderRadius:6,padding:"3px 10px",fontSize:10,cursor:"pointer",color:"#7A6A5A",fontFamily:"'Outfit',sans-serif"}}>Checkpoint</button>
          <button onClick={downloadAuditLog} style={{border:"1px solid #E8DDD0",background:"#FFFCF7",borderRadius:6,padding:"3px 10px",fontSize:10,cursor:"pointer",color:"#7A6A5A",fontFamily:"'Outfit',sans-serif"}}>Audit JSONL</button>
          {(tab==="seating"||tab==="jourj")&&<button onClick={exportLandscapeSeatingPdf} style={{border:"1px solid #D4C5B0",background:"#FFFCF7",borderRadius:6,padding:"3px 10px",fontSize:10,cursor:"pointer",color:"#5A4A3A",fontFamily:"'Outfit',sans-serif",fontWeight:600}}>PDF paysage</button>}
          <button onClick={exportProject} style={{border:"1px solid #E8DDD0",background:"#FFFCF7",borderRadius:6,padding:"3px 10px",fontSize:10,cursor:"pointer",color:"#7A6A5A",fontFamily:"'Outfit',sans-serif"}}>Exporter projet</button>
          <button onClick={onImportClick} style={{border:"1px solid #E8DDD0",background:"#FFFCF7",borderRadius:6,padding:"3px 10px",fontSize:10,cursor:"pointer",color:"#7A6A5A",fontFamily:"'Outfit',sans-serif"}}>Importer projet</button>
          <input ref={importInputRef} type="file" accept=".json,application/json" onChange={onImportFile} style={{display:"none"}}/>
          <button onClick={()=>{if(confirm("Tout réinitialiser ?")){localStorage.removeItem(STORAGE_KEY);location.reload();}}} style={{border:"1px solid #E8DDD0",background:"#FFFCF7",borderRadius:6,padding:"3px 10px",fontSize:10,cursor:"pointer",color:"#A09080",fontFamily:"'Outfit',sans-serif"}}>Réinit.</button>
        </div>
      </div>

      {commandAlerts.length>0&&(
        <div style={{padding:"6px 20px",borderBottom:"1px solid #F0E8DC",background:"#FFF8EE",fontSize:11,color:"#7A6A5A",display:"flex",gap:10,flexWrap:"wrap"}}>
          {commandAlerts.map((w,i)=><span key={i}>• {w}</span>)}
        </div>
      )}

      {/* Zone bar */}
      {tab!=="jourj"&&tab!=="guests"&&tab!=="prestas"&&tab!=="print"&&(
        <div style={{padding:"8px 20px",display:"flex",alignItems:"center",gap:6,borderBottom:"1px solid #F0E8DC",background:"#FDFAF5",flexShrink:0,overflowX:"auto"}}>
          <span style={{fontSize:10,textTransform:"uppercase",letterSpacing:1.5,color:"#A09080",fontWeight:500,marginRight:6,whiteSpace:"nowrap"}}>Zones :</span>
          {zones.map(z=>(
            <div key={z.id} style={{display:"flex",alignItems:"center",gap:4}}>
              <button onClick={()=>setActiveZone(z.id)} style={{padding:"5px 14px",border:`1.5px solid ${activeZone===z.id?z.color:"#E8DDD0"}`,borderRadius:20,cursor:"pointer",fontSize:12,fontFamily:"'Outfit',sans-serif",fontWeight:activeZone===z.id?500:400,background:activeZone===z.id?z.color+"15":"transparent",color:activeZone===z.id?z.color:"#8A7A6A",transition:"all 0.2s",whiteSpace:"nowrap"}}>{z.name}</button>
              {zones.length>1&&<button onClick={()=>removeZone(z.id)} style={{border:"none",background:"none",cursor:"pointer",color:"#C8A8A0",fontSize:13,padding:0,lineHeight:1}}>×</button>}
            </div>
          ))}
          <button onClick={()=>setZoneModal(true)} style={{padding:"5px 12px",border:"1px dashed #D4C5B0",borderRadius:20,cursor:"pointer",fontSize:12,fontFamily:"'Outfit',sans-serif",color:"#A09080",background:"transparent",whiteSpace:"nowrap"}}>+ Zone</button>
        </div>
      )}

      {/* Zone modal */}
      {zoneModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.3)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setZoneModal(false)}>
          <div style={{background:"#FFFCF7",borderRadius:14,padding:28,width:340,boxShadow:"0 12px 40px rgba(0,0,0,0.15)"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:400,marginBottom:16}}>Nouvelle zone</div>
            <input value={newZoneName} onChange={e=>setNewZoneName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addZone()} placeholder="Ex: Cour intérieure, Terrasse..." style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid #D4C5B0",background:"#FAF6F0",fontFamily:"'Outfit',sans-serif",fontSize:14,outline:"none",marginBottom:14}}/>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setZoneModal(false)} style={{padding:"8px 18px",borderRadius:8,border:"1px solid #D4C5B0",background:"transparent",cursor:"pointer",fontFamily:"'Outfit',sans-serif",fontSize:13,color:"#8A7A6A"}}>Annuler</button>
              <button onClick={addZone} style={{padding:"8px 18px",borderRadius:8,border:"none",background:"#8B7355",color:"#FFFCF7",cursor:"pointer",fontFamily:"'Outfit',sans-serif",fontSize:13,fontWeight:500}}>Créer</button>
            </div>
          </div>
        </div>
      )}

      {tab==="jourj"&&(
        <div className="day-shell">
          <div className="day-inner">
            <div className="day-hero">
              <div>
                <div className="day-title">Tableau de bord Jour J</div>
                <div style={{fontSize:12,color:"#8A7A6A",marginTop:3}}>Lecture rapide, recherche invités, tables, prestataires et planning opérationnel.</div>
              </div>
              <div className="day-actions">
                <button onClick={()=>setTab("seating")} style={{padding:"9px 14px",borderRadius:8,border:"1px solid #D4C5B0",background:"#FFFCF7",cursor:"pointer",fontFamily:"'Outfit',sans-serif",fontSize:12,color:"#5A4A3A"}}>Voir le plan</button>
                <button onClick={exportLandscapeSeatingPdf} style={{padding:"9px 14px",borderRadius:8,border:"1px solid #D4C5B0",background:"#FFFCF7",cursor:"pointer",fontFamily:"'Outfit',sans-serif",fontSize:12,color:"#5A4A3A",fontWeight:500}}>PDF paysage</button>
                <button onClick={()=>setTab("print")} style={{padding:"9px 14px",borderRadius:8,border:"none",background:"#8B7355",color:"#FFFCF7",cursor:"pointer",fontFamily:"'Outfit',sans-serif",fontSize:12,fontWeight:500}}>Imprimer / PDF</button>
              </div>
            </div>

            <div className="day-stats">
              {[
                {label:"Invités",value:guests.length,color:"#4C78A8"},
                {label:"Placés",value:assignedSet.size,color:"#54A24B"},
                {label:"Non placés",value:unassignedGuests.length,color:unassignedGuests.length?"#C07050":"#54A24B"},
                {label:"Places libres",value:Math.max(0,totalSeats-assignedSet.size),color:"#8B7355"},
              ].map(c=>(<div key={c.label} style={{background:"#FFFCF7",border:"1px solid #E8DDD0",borderRadius:8,padding:14}}>
                <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:1.4,color:"#A09080",fontWeight:500}}>{c.label}</div>
                <div style={{fontSize:28,fontWeight:600,color:c.color,marginTop:4}}>{c.value}</div>
              </div>))}
            </div>

            {dayIssues.length>0&&(
              <div style={{border:"1px solid #E0B0A0",background:"#FFF2EC",borderRadius:8,padding:"10px 12px",marginBottom:14,display:"flex",gap:12,flexWrap:"wrap",fontSize:12,color:"#9B553D"}}>
                <strong>À vérifier</strong>{dayIssues.map((x,i)=><span key={i}>• {x}</span>)}
              </div>
            )}

            <div className="day-grid">
              <div className="day-stack">
                <section className="day-section">
                  <div style={{fontSize:13,fontWeight:600,color:"#5A4A3A",marginBottom:10}}>Recherche invité</div>
                  <input value={daySearch} onChange={e=>setDaySearch(e.target.value)} placeholder="Taper un prénom ou un nom..." style={{width:"100%",padding:"12px 14px",borderRadius:8,border:"1px solid #D4C5B0",background:"#FAF6F0",fontFamily:"'Outfit',sans-serif",fontSize:15,outline:"none",marginBottom:10}}/>
                  {daySearch.trim()&&!dayGuestResults.length&&<div style={{fontSize:12,color:"#B0A090",fontStyle:"italic"}}>Aucun invité trouvé.</div>}
                  {dayGuestResults.map(g=>{const seat=findGuestSeat(g);const evs=EVENT_CATEGORIES.filter(ev=>guestEvents?.[g]?.[ev.key]);return(
                    <div key={g} style={{padding:"10px 0",borderTop:"1px solid #F0E8DC",display:"flex",justifyContent:"space-between",gap:10,alignItems:"center"}}>
                      <div>
                        <div style={{fontSize:14,fontWeight:500,color:"#3A2E22"}}>{g}</div>
                        <div style={{fontSize:12,color:seat?"#6B8E6B":"#C07050",marginTop:2}}>{seat?`${seat.table.name} · place ${seat.seat} · ${seat.zone?.name||"Zone inconnue"}`:"Non placé"}</div>
                        {!!evs.length&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:5}}>{evs.map(ev=><span key={ev.key} style={{fontSize:10,padding:"2px 6px",borderRadius:12,background:ev.color+"18",color:ev.color}}>{ev.label}</span>)}</div>}
                      </div>
                      {seat&&<button onClick={()=>{setActiveZone(seat.zone?.id||activeZone);setSelTable(seat.table.id);setEditTable(seat.table.id);setTab("seating");}} style={{padding:"6px 9px",borderRadius:7,border:"1px solid #D4C5B0",background:"#FFFCF7",cursor:"pointer",fontSize:11,color:"#5A4A3A"}}>Localiser</button>}
                    </div>
                  );})}
                </section>

                <section className="day-section">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#5A4A3A"}}>Planning prestataires</div>
                    <button onClick={()=>setTab("prestas")} style={{border:"none",background:"transparent",color:"#8B7355",fontSize:11,cursor:"pointer"}}>Modifier</button>
                  </div>
                  {dayTimeline.slice(0,14).map((it,i)=>{const cat=PRESTA_CATEGORIES.find(c=>c.key===it.p.category);return(
                    <div key={`${it.p.id}-${it.label}-${i}`} style={{display:"grid",gridTemplateColumns:"54px 1fr",gap:10,padding:"8px 0",borderTop:i?"1px solid #F0E8DC":"none"}}>
                      <div style={{fontSize:13,fontWeight:600,color:"#5A4A3A"}}>{it.time}</div>
                      <div>
                        <div style={{fontSize:13,color:"#3A2E22"}}>{it.label} · {cat?.label||"Prestataire"}</div>
                        <div style={{fontSize:12,color:"#8A7A6A"}}>{it.p.name}{it.p.phone?` · ${it.p.phone}`:""}{it.p.location?` · ${it.p.location}`:""}</div>
                      </div>
                    </div>
                  );})}
                  {!dayTimeline.length&&<div style={{fontSize:12,color:"#B0A090",fontStyle:"italic"}}>Aucun horaire prestataire renseigné.</div>}
                </section>
              </div>

              <div className="day-stack">
                <section className="day-section">
                  <div style={{fontSize:13,fontWeight:600,color:"#5A4A3A",marginBottom:10}}>Prestataires du jour</div>
                  <div style={{display:"grid",gap:8}}>
                    {prestataires.slice(0,10).map(p=>{const cat=PRESTA_CATEGORIES.find(c=>c.key===p.category);const status=p.dayStatus||"attendu";return(
                      <div key={p.id} style={{border:"1px solid #F0E8DC",borderRadius:8,padding:10,background:"#FAF6F0"}}>
                        <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"center"}}>
                          <div>
                            <div style={{fontSize:13,fontWeight:500,color:"#3A2E22"}}>{cat?.icon} {p.name}</div>
                            <div style={{fontSize:11,color:"#8A7A6A",marginTop:2}}>{cat?.label||"Prestataire"}{p.phone?` · ${p.phone}`:""}{p.arrivalTime?` · arrivée ${p.arrivalTime}`:""}</div>
                          </div>
                          <span style={{fontSize:10,textTransform:"uppercase",letterSpacing:1,padding:"3px 7px",borderRadius:12,background:status==="termine"?"#EEF8EA":status==="installe"?"#EAF4FF":status==="arrive"?"#FFF5E6":"#F0E8DC",color:status==="termine"?"#4F7A45":status==="installe"?"#4C78A8":status==="arrive"?"#9A6A30":"#8A7A6A"}}>{status}</span>
                        </div>
                        {!editLocked&&<div style={{display:"flex",gap:5,marginTop:8,flexWrap:"wrap"}}>
                          {["attendu","arrive","installe","termine"].map(st=><button key={st} onClick={()=>setPrestataires(prestataires.map(x=>x.id===p.id?{...x,dayStatus:st}:x))} style={{fontSize:10,padding:"4px 7px",borderRadius:6,border:"1px solid #D4C5B0",background:status===st?"#EDE5D8":"#FFFCF7",cursor:"pointer",color:"#5A4A3A"}}>{st}</button>)}
                        </div>}
                      </div>
                    );})}
                    {!prestataires.length&&<div style={{fontSize:12,color:"#B0A090",fontStyle:"italic"}}>Aucun prestataire renseigné.</div>}
                  </div>
                </section>

                <section className="day-section">
                  <div style={{fontSize:13,fontWeight:600,color:"#5A4A3A",marginBottom:10}}>Vue par table</div>
                  <div className="day-table-list">
                    {dayTableCards.map(({table,zone,guests:gs,capacity})=>(
                      <div key={table.id} style={{border:"1px solid #F0E8DC",borderRadius:8,padding:10,background:"#FAF6F0"}}>
                        <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"center",marginBottom:6}}>
                          <div>
                            <div style={{fontSize:13,fontWeight:600,color:"#3A2E22"}}>{table.name}</div>

                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {unassignedGuests.map(g=>(<span key={g} style={{fontSize:12,padding:"4px 10px",background:"#FDF0EA",borderRadius:6,border:"1px solid #E0B0A0"}}>{g}</span>))}
                  {!unassignedGuests.length&&<span style={{fontSize:12,color:"#6B8E6B"}}>Tous les invités sont placés !</span>}
                </div>
              </div>
            </div>
          </div>
        )}
      </div>}
    </div>
  );
}

/* ═══ Draggable Venue Element ═══ */
function VEl({el,isR,sel,canDrag,onSelect,onDrag,zoom,panX,panY,containerRef}) {
  const ref=useRef(null);
  const dr=useRef(false);
  const off=useRef({x:0,y:0});

  const down=e=>{
    e.stopPropagation();onSelect();if(!canDrag)return;
    dr.current=true;
    const rect=containerRef.current?.getBoundingClientRect()||{left:0,top:0};
    const cx=(e.clientX-rect.left-panX)/zoom;
    const cy=(e.clientY-rect.top-panY)/zoom;
    off.current={x:cx-el.x,y:cy-el.y};
    ref.current?.setPointerCapture(e.pointerId);
  };
  const move=e=>{
    if(!dr.current)return;
    const rect=containerRef.current?.getBoundingClientRect()||{left:0,top:0};
    const cx=(e.clientX-rect.left-panX)/zoom;
    const cy=(e.clientY-rect.top-panY)/zoom;
    onDrag(cx-off.current.x, cy-off.current.y);
  };
  const up=e=>{dr.current=false;ref.current?.releasePointerCapture(e.pointerId);};

  const isTr=el.type==="label"||el.type==="zone";const isZ=el.type==="zone";

  return(
    <div data-interactive="1" ref={ref} onClick={e=>{e.stopPropagation();onSelect();}} onPointerDown={down} onPointerMove={move} onPointerUp={up} style={{
      position:"absolute",left:el.x-el.w/2,top:el.y-el.h/2,width:el.w,height:el.h,
      cursor:canDrag?"move":"default",
      border:sel?"2px solid #8B7355":isZ?"2px dashed #C8B8A0":"2px solid transparent",
      borderRadius:isR?"50%":el.type==="arche"?"50% 50% 4px 4px":6,
      background:el.color||"#D4C5B0",
      display:"flex",alignItems:"center",justifyContent:"center",
      fontFamily:"'Outfit',sans-serif",fontSize:isZ?13:11,fontWeight:500,
      color:el.type==="bar"||el.type==="mur_ext"?"#F5EDE3":"#5A4A3A",
      userSelect:"none",whiteSpace:"pre-line",textAlign:"center",padding:4,lineHeight:1.2,
      boxShadow:sel?"0 0 0 3px rgba(139,115,85,0.2)":isTr?"none":"0 1px 4px rgba(0,0,0,0.1)",
      transform:`rotate(${el.rotation||0}deg)`,transition:"box-shadow 0.15s",
      zIndex:isZ?0:sel?10:1,opacity:isZ?0.6:1,
    }}>{el.label}</div>
  );
}

/* ═══ SVG Table ═══ */
function STbl({table,sel,onSelect,onDrag,asgn,onDrop,zoom,panX,panY,containerRef,onSeatHover,guestEvents,canInteract=true}) {
  const dr=useRef(false);
  const off=useRef({x:0,y:0});
  const chairDrag=useRef(null);
  const chairs=getChairs(table);
  const c=TABLE_COLORS[table.colorIdx%TABLE_COLORS.length];
  const rot=table.rotation||0;
  const isManual=table.seatLayout?.mode==="manual";

  const down=e=>{
    if(!canInteract)return;
    e.stopPropagation();onSelect(table.id);dr.current=true;
    const rect=containerRef.current?.getBoundingClientRect()||{left:0,top:0};
    const cx=(e.clientX-rect.left-panX)/zoom;
    const cy=(e.clientY-rect.top-panY)/zoom;
    off.current={x:cx-table.x,y:cy-table.y};
  };
  const move=e=>{
    if(!dr.current)return;
    const rect=containerRef.current?.getBoundingClientRect()||{left:0,top:0};
    const cx=(e.clientX-rect.left-panX)/zoom;
    const cy=(e.clientY-rect.top-panY)/zoom;
    onDrag(table.id,cx-off.current.x,cy-off.current.y);
  };
  const up=()=>{dr.current=false;};
  const chairDown=(e,i)=>{
    if(!canInteract)return;
    e.stopPropagation();
    chairDrag.current=i;
    e.currentTarget.setPointerCapture?.(e.pointerId);
  };
  const chairMove=(e,i)=>{
    if(!canInteract)return;
    if(chairDrag.current!==i)return;
    e.stopPropagation();
    const rect=containerRef.current?.getBoundingClientRect()||{left:0,top:0};
    const cx=(e.clientX-rect.left-panX)/zoom;
    const cy=(e.clientY-rect.top-panY)/zoom;
    onDrop("__MOVE_CHAIR__",table.id,i,cx,cy);
  };
  const chairUp=e=>{
    if(!canInteract)return;
    if(chairDrag.current===null)return;
    e.stopPropagation();
    chairDrag.current=null;
    e.currentTarget.releasePointerCapture?.(e.pointerId);
  };
  const showSeatCard=(guest,index,ch)=>{
    if(!canInteract)return;
    if(!guest){ onSeatHover?.(null); return; }
    onSeatHover?.({
      guest,
      table:table.name,
      seat:index+1,
      x:ch.x,
      y:ch.y,
      events:EVENT_CATEGORIES.filter(ev=>guestEvents?.[guest]?.[ev.key]).map(ev=>({key:ev.key,label:ev.label,color:ev.color})),
    });
  };

  return(
    <g data-interactive={canInteract?"1":undefined} style={{cursor:canInteract?"move":"default",pointerEvents:canInteract?"all":"none"}} onClick={e=>e.stopPropagation()} onPointerDown={down} onPointerMove={move} onPointerUp={up}>
      <g transform={`rotate(${rot} ${table.x} ${table.y})`}>
        {table.shape==="round"?(<circle cx={table.x} cy={table.y} r={table.radius} fill={c} fillOpacity={0.15} stroke={sel?c:c+"88"} strokeWidth={sel?3:2}/>
        ):table.shape==="u"?(()=>{
          const w=getUEffectiveUWidth(table),h=Math.max(120,table.uHeight||220),tk=Math.min(Math.max(28,table.thickness||58),Math.min(w,h)-24);
          const x0=table.x-w/2,y0=table.y-h/2,x1=table.x+w/2,y1=table.y+h/2;
          const d=`M ${x0} ${y0} L ${x1} ${y0} L ${x1} ${y1} L ${x1-tk} ${y1} L ${x1-tk} ${y0+tk} L ${x0+tk} ${y0+tk} L ${x0+tk} ${y1} L ${x0} ${y1} Z`;
          return <path d={d} fill={c} fillOpacity={0.15} stroke={sel?c:c+"88"} strokeWidth={sel?3:2}/>;
        })()
        :(<rect x={table.x-table.width/2} y={table.y-table.height/2} width={table.width} height={table.height} rx={6} fill={c} fillOpacity={0.15} stroke={sel?c:c+"88"} strokeWidth={sel?3:2}/>)}
        <text x={table.x} y={table.y} textAnchor="middle" dominantBaseline="central" fill={c} fontFamily="'Cormorant Garamond',serif" fontSize={13} fontWeight={600} style={{pointerEvents:"none"}}>{table.name}</text>
      </g>
      {chairs.map((ch,i)=>{const g=asgn[table.id+"-"+i];return(
        <g key={i} onDragOver={e=>{e.preventDefault();e.stopPropagation();}} onDrop={e=>{e.preventDefault();e.stopPropagation();const gn=e.dataTransfer.getData("guest");if(gn)onDrop(gn,table.id,i);}}>
          <circle cx={ch.x} cy={ch.y} r={CHAIR_R} fill={g?c+"30":"#F5EDE3"} stroke={g?c:"#C2B199"} strokeWidth={g?2:1.5} strokeDasharray={g?"":"3,3"} style={{cursor:"grab"}} onPointerDown={e=>chairDown(e,i)} onPointerMove={e=>chairMove(e,i)} onPointerUp={chairUp} onPointerEnter={()=>showSeatCard(g,i,ch)} onPointerLeave={()=>onSeatHover?.(null)}/>
          {g?(()=>{
            const words=g.split(" ");const firstName=words[0]||"";const lastName=words.slice(1).join(" ");
            const maxChars=Math.floor(CHAIR_R*2/3.2);
            const fitName=n=>n.length>maxChars?n.slice(0,maxChars-1)+".":n;
            const fs=Math.min(8, CHAIR_R*2 / Math.max(firstName.length,lastName.length||1) * 1.3);
            const clampFs=Math.max(5.5,Math.min(8.5,fs));
            const lineH=clampFs+2;
            const yOff=words.length>1?-lineH/2:0;
            return(<text x={ch.x} y={ch.y+yOff} textAnchor="middle" dominantBaseline="central" fill="#3A2E22" fontFamily="'Outfit',sans-serif" fontSize={clampFs} fontWeight={500} style={{pointerEvents:"none"}}>
              <tspan x={ch.x} dy={0}>{fitName(firstName)}</tspan>
              {lastName&&<tspan x={ch.x} dy={lineH}>{fitName(lastName)}</tspan>}
            </text>);
          })()
          :(<text x={ch.x} y={ch.y} textAnchor="middle" dominantBaseline="central" fill="#C2B199" fontFamily="'Outfit',sans-serif" fontSize={12} style={{pointerEvents:"none"}}>+</text>)}
        </g>);})}
    </g>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
